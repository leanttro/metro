<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — nearestmetro.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary:     #1a73e8;
            --dark:        #0d47a1;
            --light:       #e3f2fd;
            --light-gray:  #f8f9fa;
            --medium-gray: #e0e0e0;
            --dark-gray:   #343a40;
            --text-color:  #495057;
            --white:       #ffffff;
            --green:       #2e7d32;
            --green-light: #e8f5e9;
            --red:         #c62828;
            --red-light:   #fdecea;
            --orange:      #e65100;
            --orange-light:#fff3e0;
            --sidebar-w:   240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--light-gray);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ─────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            background: linear-gradient(180deg, var(--dark) 0%, #1565c0 100%);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 100;
            box-shadow: 2px 0 12px rgba(0,0,0,0.15);
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .sidebar-logo img {
            height: 44px;
            filter: brightness(0) invert(1);
        }
        .sidebar-logo span {
            display: block;
            color: rgba(255,255,255,0.55);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 0;
            overflow-y: auto;
        }

        .nav-section-label {
            color: rgba(255,255,255,0.35);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 16px 20px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: background 0.15s, color 0.15s;
            border-left: 3px solid transparent;
        }
        .nav-item i { width: 18px; text-align: center; font-size: 15px; }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
        .nav-item.active { background: rgba(255,255,255,0.13); color: var(--white); border-left-color: var(--white); }
        .nav-item .badge {
            margin-left: auto;
            background: #ef5350;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.15s;
        }
        .sidebar-footer a:hover { color: var(--white); }

        /* ── Main ─────────────────────────────────── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            background: var(--white);
            padding: 0 28px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--medium-gray);
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .topbar h1 {
            font-size: 17px;
            font-weight: 600;
            color: var(--dark-gray);
        }
        .topbar-user {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-color);
            font-size: 14px;
        }
        .topbar-user .avatar {
            width: 32px; height: 32px;
            background: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 13px;
        }

        .content {
            padding: 28px;
            flex: 1;
        }

        /* ── Panels ───────────────────────────────── */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── Stats cards ──────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .stat-card .label { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: var(--dark-gray); }
        .stat-card .icon { font-size: 20px; color: var(--primary); margin-bottom: 4px; }

        /* ── Section header ───────────────────────── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .section-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-gray);
        }

        /* ── Table ────────────────────────────────── */
        .table-wrap {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead th {
            background: var(--light-gray);
            color: #666;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--medium-gray);
            white-space: nowrap;
        }
        tbody td {
            padding: 13px 16px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fafafa; }

        /* ── Badges ───────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-pending  { background: var(--orange-light); color: var(--orange); }
        .badge-done     { background: var(--green-light);  color: var(--green); }
        .badge-rejected { background: var(--red-light);    color: var(--red); }
        .badge-approved { background: var(--green-light);  color: var(--green); }
        .badge-waiting  { background: #fff8e1; color: #f57f17; }

        /* ── Buttons ──────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 7px;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary   { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--dark); }
        .btn-success   { background: var(--green);   color: white; }
        .btn-success:hover { background: #1b5e20; }
        .btn-danger    { background: var(--red);     color: white; }
        .btn-danger:hover  { background: #b71c1c; }
        .btn-warning   { background: var(--orange);  color: white; }
        .btn-warning:hover { background: #bf360c; }
        .btn-ghost {
            background: none;
            color: var(--text-color);
            border: 1.5px solid var(--medium-gray);
        }
        .btn-ghost:hover { border-color: #aaa; color: var(--dark-gray); }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

        /* ── Filter tabs ──────────────────────────── */
        .filter-tabs {
            display: flex;
            gap: 4px;
            background: var(--light-gray);
            padding: 4px;
            border-radius: 8px;
        }
        .filter-tab {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: none;
            color: #777;
            font-family: 'Roboto', sans-serif;
            transition: all 0.15s;
        }
        .filter-tab.active { background: var(--white); color: var(--dark-gray); box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-weight: 600; }
        .filter-tab .count { font-size: 11px; margin-left: 4px; opacity: 0.7; }

        /* ── Empty state ──────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #bbb;
        }
        .empty-state i { font-size: 36px; margin-bottom: 12px; display: block; }
        .empty-state p { font-size: 15px; }

        /* ── Loading ──────────────────────────────── */
        .loading {
            text-align: center;
            padding: 40px;
            color: #bbb;
        }
        .loading i { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast ────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--dark-gray);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            max-width: 320px;
        }
        #toast.show { display: flex; }
        #toast.success { background: var(--green); }
        #toast.error   { background: var(--red); }

        /* ── Suggestions specific ─────────────────── */
        .suggestion-notes {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #888;
            font-size: 13px;
        }
        .suggestion-meta {
            font-size: 12px;
            color: #aaa;
        }
        .suggestion-location {
            font-weight: 500;
            color: var(--dark-gray);
        }

        /* ── Comments specific ───────────────────── */
        .comment-text {
            max-width: 260px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #555;
        }

        /* ── Edit Modal ───────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--white);
            border-radius: 14px;
            padding: 28px;
            width: 480px;
            max-width: 95vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .modal h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--dark-gray);
            margin-bottom: 20px;
        }
        .modal-field {
            margin-bottom: 14px;
        }
        .modal-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .modal-field input, .modal-field select {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--medium-gray);
            border-radius: 7px;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            color: var(--dark-gray);
            outline: none;
            transition: border-color 0.15s;
        }
        .modal-field input:focus, .modal-field select:focus {
            border-color: var(--primary);
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 22px;
        }

        /* ── Checkbox col ─────────────────────────── */
        .row-check { width: 36px; text-align: center; }
        .row-check input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--primary); }
        .bulk-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: #e8f0fe;
            border-bottom: 1px solid #c5d8fd;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
        }
        .bulk-bar.visible { display: flex; }

        /* ── Responsive ───────────────────────────── */
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-logo img { height: 30px; }
            .sidebar-logo span,
            .nav-item span,
            .nav-section-label,
            .sidebar-footer span { display: none; }
            .nav-item { justify-content: center; padding: 14px; border-left: none; border-bottom: 3px solid transparent; }
            .nav-item.active { border-bottom-color: white; border-left: none; }
            .nav-item .badge { display: none; }
            .main { margin-left: 60px; }
            .content { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            table { font-size: 13px; }
            thead th, tbody td { padding: 10px 12px; }
        }
    </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <img src="https://res.cloudinary.com/dhu1cqvrb/image/upload/v1782262509/Nearest_Metro_Modern_Logo_Concept_1_wwskph.png" alt="nearestmetro.com">
        <span>Admin Panel</span>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">Overview</div>
        <button class="nav-item active" onclick="showPanel('dashboard')">
            <i class="fas fa-chart-line"></i> <span>Dashboard</span>
        </button>

        <div class="nav-section-label">Content</div>
        <button class="nav-item" onclick="showPanel('suggestions')">
            <i class="fas fa-lightbulb"></i> <span>Suggestions</span>
            <span class="badge" id="suggestions-badge" style="display:none;"></span>
        </button>
        <button class="nav-item" onclick="showPanel('comments')">
            <i class="fas fa-comments"></i> <span>Comments</span>
            <span class="badge" id="comments-badge" style="display:none;"></span>
        </button>
        <button class="nav-item" onclick="showPanel('stations')">
            <i class="fas fa-subway"></i> <span>Stations</span>
        </button>
        <button class="nav-item" onclick="showPanel('blog')">
            <i class="fas fa-newspaper"></i> <span>Blog</span>
        </button>

        <div class="nav-section-label">Structure</div>
        <button class="nav-item" onclick="showPanel('countries')">
            <i class="fas fa-globe"></i> <span>Countries</span>
        </button>
        <button class="nav-item" onclick="showPanel('cities')">
            <i class="fas fa-city"></i> <span>Cities</span>
        </button>
        <button class="nav-item" onclick="showPanel('lines')">
            <i class="fas fa-route"></i> <span>Lines</span>
        </button>
    </nav>

    <div class="sidebar-footer">
        <a href="/admin/logout">
            <i class="fas fa-right-from-bracket"></i> <span>Logout</span>
        </a>
    </div>
</aside>

<!-- ── Main ── -->
<div class="main">
    <div class="topbar">
        <h1 id="topbar-title">Dashboard</h1>
        <div class="topbar-user">
            <div class="avatar" id="userInitial">A</div>
            <span id="userName">Admin</span>
        </div>
    </div>

    <div class="content">

        <!-- ══ DASHBOARD ══ -->
        <div class="panel active" id="panel-dashboard">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="icon"><i class="fas fa-spinner fa-spin"></i></div>
                    <div class="value">—</div>
                    <div class="label">Loading…</div>
                </div>
            </div>
            <div style="background:var(--white);border-radius:12px;padding:24px;box-shadow:0 1px 6px rgba(0,0,0,0.07);">
                <h2 style="font-size:16px;font-weight:600;color:var(--dark-gray);margin-bottom:16px;">Quick Access</h2>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;" id="quickLinks">
                    <button class="btn btn-primary" onclick="showPanel('suggestions')"><i class="fas fa-lightbulb"></i> View Suggestions</button>
                    <button class="btn btn-ghost" onclick="showPanel('comments')"><i class="fas fa-comments"></i> Moderate Comments</button>
                    <button class="btn btn-ghost" onclick="showPanel('stations')"><i class="fas fa-subway"></i> Manage Stations</button>
                    <button class="btn btn-ghost" onclick="showPanel('blog')"><i class="fas fa-newspaper"></i> Manage Blog</button>
                </div>
            </div>
        </div>

        <!-- ══ SUGGESTIONS ══ -->
        <div class="panel" id="panel-suggestions">
            <div class="section-header">
                <h2><i class="fas fa-lightbulb" style="color:var(--orange);margin-right:8px;"></i> Station Suggestions</h2>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="loadSuggestions('pending')" id="tab-pending">Pending <span class="count" id="count-pending"></span></button>
                    <button class="filter-tab" onclick="loadSuggestions('done')" id="tab-done">Done <span class="count" id="count-done"></span></button>
                    <button class="filter-tab" onclick="loadSuggestions('rejected')" id="tab-rejected">Rejected <span class="count" id="count-rejected"></span></button>
                </div>
            </div>

            <div class="table-wrap">
                <div id="suggestions-body">
                    <div class="loading"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </div>

        <!-- ══ COMMENTS ══ -->
        <div class="panel" id="panel-comments">
            <div class="section-header">
                <h2><i class="fas fa-comments" style="color:var(--primary);margin-right:8px;"></i> Comments</h2>
                <button class="btn btn-ghost btn-sm" onclick="loadComments()"><i class="fas fa-refresh"></i> Refresh</button>
            </div>
            <div class="table-wrap">
                <div id="comments-body">
                    <div class="loading"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </div>

        <!-- ══ STATIONS ══ -->
        <div class="panel" id="panel-stations">
            <div class="section-header">
                <h2><i class="fas fa-subway" style="color:var(--primary);margin-right:8px;"></i> Stations</h2>
                <div class="btn-group">
                    <button class="btn btn-danger btn-sm" id="stations-bulk-delete" style="display:none" onclick="bulkDelete('stations')"><i class="fas fa-trash"></i> Delete Selected</button>
                    <button class="btn btn-ghost btn-sm" onclick="loadStations()"><i class="fas fa-refresh"></i> Refresh</button>
                </div>
            </div>
            <div class="table-wrap">
                <div id="stations-body">
                    <div class="loading"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </div>

        <!-- ══ BLOG ══ -->
        <div class="panel" id="panel-blog">
            <div class="section-header">
                <h2><i class="fas fa-newspaper" style="color:var(--primary);margin-right:8px;"></i> Blog Posts</h2>
                <div class="btn-group">
                    <button class="btn btn-danger btn-sm" id="blog-bulk-delete" style="display:none" onclick="bulkDelete('blog')"><i class="fas fa-trash"></i> Delete Selected</button>
                    <button class="btn btn-ghost btn-sm" onclick="loadBlog()"><i class="fas fa-refresh"></i> Refresh</button>
                </div>
            </div>
            <div class="table-wrap">
                <div id="blog-body">
                    <div class="loading"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </div>

        <!-- ══ COUNTRIES ══ -->
        <div class="panel" id="panel-countries">
            <div class="section-header">
                <h2><i class="fas fa-globe" style="color:var(--primary);margin-right:8px;"></i> Countries</h2>
                <div class="btn-group">
                    <button class="btn btn-danger btn-sm" id="countries-bulk-delete" style="display:none" onclick="bulkDelete('countries')"><i class="fas fa-trash"></i> Delete Selected</button>
                    <button class="btn btn-ghost btn-sm" onclick="loadCountries()"><i class="fas fa-refresh"></i> Refresh</button>
                </div>
            </div>
            <div class="table-wrap">
                <div id="countries-body">
                    <div class="loading"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </div>

        <!-- ══ CITIES ══ -->
        <div class="panel" id="panel-cities">
            <div class="section-header">
                <h2><i class="fas fa-city" style="color:var(--primary);margin-right:8px;"></i> Cities</h2>
                <div class="btn-group">
                    <button class="btn btn-danger btn-sm" id="cities-bulk-delete" style="display:none" onclick="bulkDelete('cities')"><i class="fas fa-trash"></i> Delete Selected</button>
                    <button class="btn btn-ghost btn-sm" onclick="loadCities()"><i class="fas fa-refresh"></i> Refresh</button>
                </div>
            </div>
            <div class="table-wrap">
                <div id="cities-body">
                    <div class="loading"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </div>

        <!-- ══ LINES ══ -->
        <div class="panel" id="panel-lines">
            <div class="section-header">
                <h2><i class="fas fa-route" style="color:var(--primary);margin-right:8px;"></i> Lines</h2>
                <div class="btn-group">
                    <button class="btn btn-danger btn-sm" id="lines-bulk-delete" style="display:none" onclick="bulkDelete('lines')"><i class="fas fa-trash"></i> Delete Selected</button>

<script>
// ── State ───────────────────────────────────────────
let currentPanel = 'dashboard';
let currentSuggestionsStatus = 'pending';
let suggestionsData = {};

// ── Navigation ───────────────────────────────────────
function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');

    // activate correct sidebar item
    document.querySelectorAll('.nav-item').forEach(btn => {
        if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes("'" + name + "'")) {
            btn.classList.add('active');
        }
    });

    const titles = {
        dashboard: 'Dashboard',
        suggestions: 'Station Suggestions',
        comments: 'Comments',
        stations: 'Stations',
        blog: 'Blog Posts',
        countries: 'Countries',
        cities: 'Cities',
        lines: 'Lines'
    };
    document.getElementById('topbar-title').textContent = titles[name] || name;
    currentPanel = name;

    // lazy-load each panel
    if (name === 'dashboard') loadStats();
    if (name === 'suggestions') loadSuggestions(currentSuggestionsStatus);
    if (name === 'comments') loadComments();
    if (name === 'stations') loadStations();
    if (name === 'blog') loadBlog();
    if (name === 'countries') loadCountries();
    if (name === 'cities') loadCities();
    if (name === 'lines') loadLines();
}

// ── Toast ────────────────────────────────────────────
function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    const msgEl = document.getElementById('toast-msg');
    el.className = 'show ' + type;
    msgEl.textContent = msg;
    el.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-triangle-exclamation';
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Format date ───────────────────────────────────────
function fmtDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) +
           ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

// ── API helper ────────────────────────────────────────
async function api(url, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return res.json();
}

// ── DASHBOARD ─────────────────────────────────────────
async function loadStats() {
    try {
        const data = await api('/api/admin/stats');
        const grid = document.getElementById('statsGrid');
        const items = [
            { label: 'Stations',           value: data.stations,         icon: 'fa-subway',      color: '#1a73e8' },
            { label: 'Countries',          value: data.countries,        icon: 'fa-globe',       color: '#0d47a1' },
            { label: 'Cities',             value: data.cities,           icon: 'fa-city',        color: '#6200ea' },
            { label: 'Lines',              value: data.lines,            icon: 'fa-route',       color: '#00796b' },
            { label: 'Blog Posts',         value: data.posts,            icon: 'fa-newspaper',   color: '#558b2f' },
            { label: 'Pending Comments',   value: data.pending_comments, icon: 'fa-comments',    color: data.pending_comments > 0 ? '#e65100' : '#888' },
            { label: 'Suggestions',        value: data.suggestions ?? '—', icon: 'fa-lightbulb', color: '#f57f17' },
        ];
        grid.innerHTML = items.map(i => `
            <div class="stat-card">
                <div class="icon" style="color:${i.color}"><i class="fas ${i.icon}"></i></div>
                <div class="value">${i.value}</div>
                <div class="label">${i.label}</div>
            </div>
        `).join('');

        // update badges
        if (data.pending_comments > 0) {
            const b = document.getElementById('comments-badge');
            b.textContent = data.pending_comments;
            b.style.display = 'inline-block';
        }
    } catch(e) {
        console.error(e);
    }
}

// ── SUGGESTIONS ───────────────────────────────────────
async function loadSuggestions(status) {
    currentSuggestionsStatus = status;

    // update tab UI
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + status).classList.add('active');

    const wrap = document.getElementById('suggestions-body');
    wrap.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i></div>';

    try {
        const rows = await api('/api/admin/suggestions?status=' + status);
        suggestionsData[status] = rows;

        // update counts
        document.getElementById('count-' + status).textContent = '(' + rows.length + ')';

        // also load counts for other tabs if not loaded
        ['pending','done','rejected'].forEach(async s => {
            if (!suggestionsData[s]) {
                const r = await api('/api/admin/suggestions?status=' + s);
                suggestionsData[s] = r;
                document.getElementById('count-' + s).textContent = '(' + r.length + ')';
                if (s === 'pending' && r.length > 0) {
                    const b = document.getElementById('suggestions-badge');
                    b.textContent = r.length;
                    b.style.display = 'inline-block';
                }
            }
        });

        if (rows.length === 0) {
            wrap.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>No ${status} suggestions</p></div>`;
            return;
        }

        wrap.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Station</th>
                        <th>City</th>
                        <th>Country</th>
                        <th>Notes</th>
                        <th>Submitted</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    ${rows.map(r => `
                        <tr id="sg-row-${r.id}">
                            <td style="color:#bbb;font-size:12px;">${r.id}</td>
                            <td><strong class="suggestion-location">${esc(r.station_name)}</strong></td>
                            <td>${esc(r.city)}</td>
                            <td>${esc(r.country)}</td>
                            <td><span class="suggestion-notes" title="${esc(r.notes || '')}">${r.notes ? esc(r.notes) : '<span style="color:#ddd">—</span>'}</span></td>
                            <td><span class="suggestion-meta">${fmtDate(r.created_at)}</span></td>
                            <td>
                                <div class="btn-group">
                                    ${status === 'pending' ? `
                                        <button class="btn btn-success btn-sm" onclick="updateSuggestion(${r.id},'done')">
                                            <i class="fas fa-check"></i> Done
                                        </button>
                                        <button class="btn btn-warning btn-sm" onclick="updateSuggestion(${r.id},'rejected')">
                                            <i class="fas fa-ban"></i> Reject
                                        </button>
                                    ` : `
                                        <button class="btn btn-ghost btn-sm" onclick="updateSuggestion(${r.id},'pending')">
                                            <i class="fas fa-arrow-rotate-left"></i> Reopen
                                        </button>
                                    `}
                                    <button class="btn btn-danger btn-sm" onclick="deleteSuggestion(${r.id})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch(e) {
        wrap.innerHTML = '<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>Failed to load suggestions</p></div>';
    }
}

async function updateSuggestion(id, status) {
    try {
        const data = await api(`/api/admin/suggestions/${id}`, 'PUT', { status });
        if (data.ok) {
            toast(status === 'done' ? 'Marked as done!' : status === 'rejected' ? 'Rejected.' : 'Reopened.');
            suggestionsData = {}; // clear cache
            loadSuggestions(currentSuggestionsStatus);
        }
    } catch(e) { toast('Error updating', 'error'); }
}

async function deleteSuggestion(id) {
    if (!confirm('Delete this suggestion permanently?')) return;
    try {
        const data = await api(`/api/admin/suggestions/${id}`, 'DELETE');
        if (data.ok) {
            toast('Deleted.');
            suggestionsData = {};
            loadSuggestions(currentSuggestionsStatus);
        }
    } catch(e) { toast('Error deleting', 'error'); }
}

        { key: 'name',         label: 'Name',    type: 'text' },
        { key: 'line_name',    label: 'Line',    type: 'text' },
        { key: 'city_name',    label: 'City',    type: 'text' },
        { key: 'country_name', label: 'Country', type: 'text' },
        { key: 'active', label: 'Status', type: 'select', options: [{v:'1',l:'Active'},{v:'0',l:'Inactive'}] },
    ],
    blog: [
        { key: 'title',    label: 'Title',    type: 'text' },
        { key: 'subtitle', label: 'Subtitle', type: 'text' },
        { key: 'author',   label: 'Author',   type: 'text' },
        { key: 'active', label: 'Status', type: 'select', options: [{v:'1',l:'Published'},{v:'0',l:'Draft'}] },
    ],
};

let _editEntity = null;
let _editRow    = null;

function openEdit(entity, row) {
    _editEntity = entity;
    _editRow    = row;
    const fields = editFields[entity] || [];
    document.getElementById('editModalTitle').textContent = 'Edit ' + entity.slice(0,-1).charAt(0).toUpperCase() + entity.slice(1,-1);
    document.getElementById('editModalFields').innerHTML = fields.map(f => {
        if (f.type === 'select') {
            const val = row[f.key] == 1 || row[f.key] === true ? '1' : '0';
            return `<div class="modal-field">
                <label>${f.label}</label>
                <select id="ef-${f.key}">
                    ${f.options.map(o => `<option value="${o.v}"${val === o.v ? ' selected' : ''}>${o.l}</option>`).join('')}
                </select>
            </div>`;
        }
        return `<div class="modal-field">
            <label>${f.label}</label>
            <input type="text" id="ef-${f.key}" value="${esc(row[f.key] || '')}">
        </div>`;
    }).join('');
    document.getElementById('editModal').classList.add('open');
}

function closeModal() {
    document.getElementById('editModal').classList.remove('open');
    _editEntity = null;
    _editRow    = null;
}

async function saveModal() {
    if (!_editEntity || !_editRow) return;
    const fields = editFields[_editEntity] || [];
    const body = { id: _editRow.id };
    fields.forEach(f => {
        const el = document.getElementById('ef-' + f.key);
        if (el) body[f.key] = f.type === 'select' ? (el.value === '1' ? 1 : 0) : el.value;
    });
    try {
        const data = await api(`/api/admin/${_editEntity}/${_editRow.id}`, 'PUT', body);
        if (data.ok || data.id || data.success) {
            toast('Saved!');
            closeModal();
            // reload the right panel
            if (_editEntity === 'cities')    loadCities();
            if (_editEntity === 'countries') loadCountries();
            if (_editEntity === 'lines')     loadLines();
            if (_editEntity === 'stations')  loadStations();
            if (_editEntity === 'blog')      loadBlog();
        } else {
            toast(data.error || 'Error saving', 'error');
        }
    } catch(e) { toast('Error saving', 'error'); }
}

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

async function deleteOne(entity, id) {
    if (!confirm('Delete this item permanently?')) return;
    try {
        const data = await api(`/api/admin/${entity}/${id}`, 'DELETE');
        if (data.ok || data.success) {
            toast('Deleted.');
            if (entity === 'cities')    loadCities();
            if (entity === 'countries') loadCountries();
            if (entity === 'lines')     loadLines();
            if (entity === 'stations')  loadStations();
            if (entity === 'blog')      loadBlog();
        } else {
            toast(data.error || 'Error deleting', 'error');
        }
    } catch(e) { toast('Error deleting', 'error'); }
}

function toggleAllChecks(entity, checked) {
    document.querySelectorAll(`.chk-${entity}`).forEach(c => c.checked = checked);
    updateBulkBar(entity);
}

function updateBulkBar(entity) {
    const count = document.querySelectorAll(`.chk-${entity}:checked`).length;
    const btn = document.getElementById(`${entity}-bulk-delete`);
    if (btn) btn.style.display = count > 0 ? 'inline-flex' : 'none';
    // sync select-all checkbox
    const all = document.querySelectorAll(`.chk-${entity}`).length;
    const allChk = document.getElementById(`chk-${entity}-all`);
    if (allChk) allChk.indeterminate = count > 0 && count < all, allChk.checked = count === all && all > 0;
}

async function bulkDelete(entity) {
    const ids = [...document.querySelectorAll(`.chk-${entity}:checked`)].map(c => c.value);
    if (!ids.length) return;
    if (!confirm(`Delete ${ids.length} item(s) permanently?`)) return;
    let errors = 0;
    for (const id of ids) {
        try {
            await api(`/api/admin/${entity}/${id}`, 'DELETE');
        } catch(e) { errors++; }
    }
    if (errors) toast(`Done with ${errors} error(s).`, 'error');
    else toast(`${ids.length} item(s) deleted.`);
    if (entity === 'cities')    loadCities();
    if (entity === 'countries') loadCountries();
    if (entity === 'lines')     loadLines();
    if (entity === 'stations')  loadStations();
    if (entity === 'blog')      loadBlog();
}

// ── Escape HTML ───────────────────────────────────────
function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────
(async function init() {
    // try to get username from session (via stats endpoint)
    try {
        const stats = await api('/api/admin/stats');
        // update pending badges from stats
        if (stats.pending_comments > 0) {
            const b = document.getElementById('comments-badge');
            b.textContent = stats.pending_comments;
            b.style.display = 'inline-block';
        }
        loadStats();
    } catch(e) {}

    // load suggestions count for sidebar badge
    try {
        const pending = await api('/api/admin/suggestions?status=pending');
        if (pending.length > 0) {
            const b = document.getElementById('suggestions-badge');
            b.textContent = pending.length;
            b.style.display = 'inline-block';
            suggestionsData['pending'] = pending;
        }
    } catch(e) {}
})();
</script>
